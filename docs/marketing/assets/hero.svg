<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" font-family="-apple-system, PingFang SC, Helvetica Neue, sans-serif">
  <rect width="1200" height="1200" fill="#15161e"/>

  <!-- Headline -->
  <text x="600" y="80" fill="#c0caf5" font-size="48" font-weight="800" text-anchor="middle">你写了 200 行 CLAUDE.md</text>
  <text x="600" y="135" fill="#7aa2f7" font-size="30" font-weight="500" text-anchor="middle">Claude 真正在听的只有这几条 ↓</text>

  <!-- CLAUDE.md panel -->
  <rect x="50" y="175" width="1100" height="800" rx="14" fill="#1a1b26" stroke="#414868" stroke-width="2"/>

  <!-- File header -->
  <rect x="50" y="175" width="1100" height="48" rx="14" fill="#16161e"/>
  <rect x="50" y="210" width="1100" height="13" fill="#16161e"/>
  <circle cx="82" cy="200" r="6" fill="#414868"/>
  <circle cx="105" cy="200" r="6" fill="#414868"/>
  <circle cx="128" cy="200" r="6" fill="#414868"/>
  <text x="600" y="207" fill="#565f89" font-size="18" text-anchor="middle" font-family="SF Mono, Menlo, monospace">CLAUDE.md</text>

  <!-- Strikethrough rules -->
  <g font-family="SF Mono, Menlo, monospace" font-size="24">
    <text x="85" y="275" fill="#3b4261">- 使用 TypeScript 严格模式</text>
    <line x1="80" y1="269" x2="535" y2="269" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="320" fill="#3b4261">- 提交代码前先跑测试</text>
    <line x1="80" y1="314" x2="455" y2="314" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="365" fill="#3b4261">- 避免使用 var, 用 const / let</text>
    <line x1="80" y1="359" x2="610" y2="359" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="410" fill="#3b4261">- 函数要短小, 单一职责</text>
    <line x1="80" y1="404" x2="495" y2="404" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="455" fill="#3b4261">- 错误要妥善处理, 不能吞异常</text>
    <line x1="80" y1="449" x2="620" y2="449" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="500" fill="#3b4261">- 变量命名要语义清晰</text>
    <line x1="80" y1="494" x2="465" y2="494" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="545" fill="#3b4261">- 不要嵌套 callback, 用 async/await</text>
    <line x1="80" y1="539" x2="685" y2="539" stroke="#f7768e" stroke-width="2.5"/>

    <text x="85" y="595" fill="#565f89" font-size="26">... 还有 193 行 ...</text>
  </g>

  <!-- Divider -->
  <line x1="100" y1="635" x2="1100" y2="635" stroke="#414868" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Highlighted rules -->
  <g font-family="SF Mono, Menlo, monospace" font-size="22">
    <rect x="70" y="660" width="1060" height="80" rx="8" fill="#1a2733"/>
    <text x="90" y="692" fill="#9ece6a">- 在 src/payment/* 目录,</text>
    <text x="110" y="724" fill="#9ece6a">  金额计算必须用 Decimal.js (浮点数会丢精度)</text>

    <rect x="70" y="755" width="1060" height="80" rx="8" fill="#1a2733"/>
    <text x="90" y="787" fill="#9ece6a">- migrations/ 下的 SQL,</text>
    <text x="110" y="819" fill="#9ece6a">  必须先 bun migrate dry-run 再执行 (生产 50M 行)</text>

    <rect x="70" y="850" width="1060" height="80" rx="8" fill="#1a2733"/>
    <text x="90" y="882" fill="#9ece6a">- 这个项目用 pnpm,</text>
    <text x="110" y="914" fill="#9ece6a">  不要 npm install (workspace 依赖会乱)</text>
  </g>

  <!-- Callout -->
  <text x="600" y="1030" fill="#c0caf5" font-size="32" font-weight="700" text-anchor="middle">那 80% 模型本来就知道。</text>
  <text x="600" y="1075" fill="#c0caf5" font-size="32" font-weight="700" text-anchor="middle">写了不仅没用, 还会淹没真正重要的规则。</text>

  <text x="600" y="1140" fill="#9ece6a" font-size="28" font-weight="600" text-anchor="middle">know · 帮你筛掉那 80%</text>
  <text x="600" y="1180" fill="#7aa2f7" font-size="22" text-anchor="middle" font-family="SF Mono, monospace">github.com/xiatiandeairen/know-for-agent</text>
</svg>
